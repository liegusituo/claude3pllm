name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      description:
        description: 'Release description'
        required: false
        default: 'Initial release'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          swift build -c release --arch arm64
          ls -la .build/release/ || ls -la .build/

      - name: Create Distribution Package
        run: |
          mkdir -p dist
          
          # Copy executable and resources
          cp -r .build/release/DeepSeekProxy dist/ 2>/dev/null || echo "Checking alternative paths..."
          cp -r Resources dist/
          
          # Verify dist folder
          ls -la dist/
          
          # Create tarball
          tar -czvf DeepSeekProxy-macos-arm64.tar.gz dist/
          
          ls -lh *.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekProxy-macos
          path: DeepSeekProxy-macos-arm64.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: DeepSeekProxy-macos
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: DeepSeekProxy-macos-arm64.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
